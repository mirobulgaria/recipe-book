<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My International Kitchen</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="navbar">
    <div class="brand">
      <span class="brand-logo" aria-hidden="true">🍽️</span>
      <span class="brand-name" data-i18n="appName">My International Kitchen</span>
    </div>
    <button id="languageToggle" class="lang-toggle" type="button" aria-label="Switch language">
      EN / BG
    </button>
  </header>

  <main>
    <section class="hero">
      <h1 data-i18n="heroTitle">Discover Recipes From Around the World</h1>
      <p data-i18n="heroSubtitle">
        Pick a country and search by dish or ingredient.
      </p>

      <div class="controls">
        <label class="control">
          <span data-i18n="countryLabel">Country</span>
          <select id="countrySelect">
            <option value="all">All countries</option>
          </select>
        </label>

        <label class="control">
          <span data-i18n="searchLabel">Search</span>
          <input
            id="searchInput"
            type="text"
            placeholder="Dish name or ingredient"
            autocomplete="off"
          />
        </label>
      </div>
    </section>

    <section class="recipes-section">
      <h2 data-i18n="recipesTitle">Recipe Collection</h2>
      <div id="resultsInfo" class="results-info"></div>
      <div id="recipesGrid" class="recipes-grid" aria-live="polite"></div>
    </section>
  </main>

  <div id="recipeModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-overlay" data-close="true"></div>
    <div class="modal-content">
      <button class="modal-close" id="closeModal" type="button" aria-label="Close">&times;</button>
      <h3 id="modalTitle"></h3>
      <p id="modalCountry" class="modal-country"></p>
      <p id="modalDescription" class="modal-description"></p>

      <section>
        <h4 data-i18n="ingredientsTitle">Ingredients</h4>
        <ul id="modalIngredients" class="ingredients-list"></ul>
      </section>

      <section>
        <h4 data-i18n="instructionsTitle">Instructions</h4>
        <ol id="modalInstructions" class="instructions-list"></ol>
      </section>
    </div>
  </div>

  <script src="recipes-data.js"></script>
  <script src="app.js"></script>
</body>
</html>
