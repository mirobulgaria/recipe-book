<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My International Kitchen</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="navbar">
    <div class="brand">
      <span class="brand-logo" aria-hidden="true">🍽️</span>
      <span class="brand-name" data-i18n="appName">My International Kitchen</span>
    </div>
    <button id="languageToggle" class="lang-toggle" type="button" aria-label="Switch language">
      EN / BG
    </button>
  </header>

  <main>
    <section id="gridView">
      <section class="hero">
      <h1 data-i18n="heroTitle">Discover Recipes From Around the World</h1>
      <p data-i18n="heroSubtitle">
        Pick a country and search by dish or ingredient.
      </p>

      <div class="controls">
        <label class="control">
          <span data-i18n="countryLabel">Country</span>
          <select id="countrySelect">
            <option value="all">All countries</option>
          </select>
        </label>

        <label class="control">
          <span data-i18n="searchLabel">Search</span>
          <input
            id="searchInput"
            type="text"
            placeholder="Dish name or ingredient"
            autocomplete="off"
          />
        </label>
      </div>
      <div class="hero-actions">
        <button id="randomRecipeBtn" class="random-btn" type="button" data-i18n="randomRecipe">
          Random recipe
        </button>
        <button id="addRecipeBtn" class="random-btn secondary-btn" type="button" data-i18n="addRecipe">
          Add recipe
        </button>
      </div>
      </section>

      <section id="recipeEditor" class="editor-card hidden">
        <h3 id="editorTitle" data-i18n="addRecipe">Add recipe</h3>
        <form id="recipeForm" class="editor-form">
          <input id="editRecipeId" type="hidden" />
          <label><span data-i18n="countryLabel">Country</span><select id="editCountryCode"></select></label>
          <label><span data-i18n="nameEn">Name (EN)</span><input id="editNameEn" type="text" required /></label>
          <label><span data-i18n="nameBg">Name (BG)</span><input id="editNameBg" type="text" required /></label>
          <label><span data-i18n="descEn">Description (EN)</span><textarea id="editDescEn" rows="2" required></textarea></label>
          <label><span data-i18n="descBg">Description (BG)</span><textarea id="editDescBg" rows="2" required></textarea></label>
          <label><span data-i18n="prepTime">Prep</span><input id="editPrepTime" type="text" placeholder="20 min" required /></label>
          <label><span data-i18n="cookTime">Cook</span><input id="editCookTime" type="text" placeholder="30 min" required /></label>
          <label><span data-i18n="servings">Servings</span><input id="editServings" type="number" min="1" required /></label>
          <label><span data-i18n="image">Image URL</span><input id="editImage" type="url" required /></label>
          <label class="full-row">
            <span data-i18n="ingredientsFormat">Ingredients (one per line: amount|unitEn|unitBg|nameEn|nameBg)</span>
            <textarea id="editIngredients" rows="5" required></textarea>
          </label>
          <label class="full-row">
            <span data-i18n="stepsFormat">Steps (one per line: instructionEn|instructionBg)</span>
            <textarea id="editSteps" rows="5" required></textarea>
          </label>
          <div class="editor-actions full-row">
            <button type="submit" class="details-btn" data-i18n="saveRecipe">Save recipe</button>
            <button id="cancelEditBtn" type="button" class="back-btn" data-i18n="cancel">Cancel</button>
          </div>
        </form>
      </section>
      <section class="recipes-section">
        <h2 data-i18n="recipesTitle">Recipe Collection</h2>
        <div id="resultsInfo" class="results-info"></div>
        <div id="recipesGrid" class="recipes-grid" aria-live="polite"></div>
      </section>
    </section>

    <section id="detailView" class="detail-view hidden" aria-live="polite">
      <button id="backToGridBtn" class="back-btn" type="button" data-i18n="backToRecipes">
        Back to recipes
      </button>

      <article class="detail-card">
        <img id="detailImage" class="detail-image" src="" alt="" />
        <h2 id="detailTitle"></h2>
        <p id="detailCountry" class="detail-country"></p>
        <p id="detailDescription" class="detail-description"></p>

        <div class="stats-grid">
          <div class="stat-item"><span aria-hidden="true">⏱️</span> <strong data-i18n="prepTime">Prep</strong>: <span id="detailPrepTime"></span></div>
          <div class="stat-item"><span aria-hidden="true">🍳</span> <strong data-i18n="cookTime">Cook</strong>: <span id="detailCookTime"></span></div>
          <div class="stat-item"><span aria-hidden="true">👥</span> <strong data-i18n="servings">Servings</strong>: <span id="detailServings"></span></div>
        </div>

        <section>
          <h3 data-i18n="ingredientsTitle">Ingredients</h3>
          <div class="ingredients-table-wrap">
            <table class="ingredients-table">
              <thead>
                <tr>
                  <th data-i18n="check">Check</th>
                  <th data-i18n="qty">Qty</th>
                  <th data-i18n="unit">Unit</th>
                  <th data-i18n="ingredient">Ingredient</th>
                </tr>
              </thead>
              <tbody id="ingredientsTableBody"></tbody>
            </table>
          </div>
        </section>

        <section>
          <h3 data-i18n="instructionsTitle">Instructions</h3>
          <ol id="detailSteps" class="detail-steps"></ol>
        </section>
      </article>
    </section>
  </main>

  <script src="recipes-data.js"></script>
  <script src="app.js"></script>
</body>
</html>
